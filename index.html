<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <title>Lincoln Jia-Xin Zhuang</title>

  <meta name="author" content="Lincoln Jia-Xin Zhuang">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" type="text/css" href="stylesheet.css?v=3">
  <link rel="stylesheet" type="text/css" href="css/style.css?v=1">
  <link rel="icon" type="image/png" href="images/seal_icon.png">
</head>

<body>
  <table class="site-shell" style="width:100%;max-width:980px;border:0px;border-spacing:0px;border-collapse:separate;margin-right:auto;margin-left:auto;">
    <tbody>
      <tr style="padding:0px">
        <td style="padding:0px">
          <div data-include="partials/intro.html"></div>
          <div data-include="partials/news.html"></div>
          <div data-include="partials/research.html"></div>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function runEmbeddedScripts(container) {
      const scripts = container.querySelectorAll('script');
      for (const oldScript of scripts) {
        const newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        oldScript.parentNode.replaceChild(newScript, oldScript);
      }
    }

    async function loadIncludes(root = document) {
      const nodes = root.querySelectorAll('[data-include]');
      for (const node of nodes) {
        const path = node.getAttribute('data-include');
        if (!path) continue;
        try {
          const response = await fetch(path, { cache: 'no-cache' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          node.innerHTML = await response.text();
          node.removeAttribute('data-include');
          runEmbeddedScripts(node);
          await loadIncludes(node);
        } catch (error) {
          node.innerHTML = `<p style="color:#c00;">Failed to load include: ${path}</p>`;
          console.error(`Include load failed: ${path}`, error);
        }
      }
    }

    loadIncludes().then(() => {
      window.dispatchEvent(new Event('partials:loaded'));
    });
  </script>
  <script src="data/publications.js"></script>
  <script src="data/news.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
