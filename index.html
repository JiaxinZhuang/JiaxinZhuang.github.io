<body>
  <table style="width:100%;max-width:880px;border:0px;border-spacing:0px;border-collapse:separate;margin-right:auto;margin-left:auto;">
    <tbody>
      <tr style="padding:0px">
        <td style="padding:0px">
          <div data-include="partials/intro.html"></div>
          <div data-include="partials/news.html"></div>
          <div data-include="partials/research.html"></div>
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function runEmbeddedScripts(container) {
      const scripts = container.querySelectorAll('script');
      for (const oldScript of scripts) {
        const newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        oldScript.parentNode.replaceChild(newScript, oldScript);
      }
    }

    async function loadIncludes(root = document) {
      const nodes = root.querySelectorAll('[data-include]');
      for (const node of nodes) {
        const path = node.getAttribute('data-include');
        if (!path) continue;
        try {
          const response = await fetch(path, { cache: 'no-cache' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          node.innerHTML = await response.text();
          node.removeAttribute('data-include');
          runEmbeddedScripts(node);
          await loadIncludes(node);
        } catch (error) {
          node.innerHTML = `<p style="color:#c00;">Failed to load include: ${path}</p>`;
          console.error(`Include load failed: ${path}`, error);
        }
      }
    }

    loadIncludes();
  </script>
</body>
